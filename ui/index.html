<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Duty Menu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="duty-menu" class="menu hidden">
        <div class="menu-icon">
            <div class="icon-circle">
                <img src="images/header-badge.png" alt="Duty Badge" />
            </div>
        </div>
        <div class="menu-header">
            <h1>Duty Menu</h1>
            <p>Select what agency you want to serve with today.</p>
        </div>
        <div class="menu-divider"></div>
        <div id="menu-content">
            <div class="menu-section">
                <div class="section-title">Assignments</div>
                <div id="menu-options" class="options"></div>
            </div>
        </div>
        <div class="menu-footer">
            <span>Press <strong>BACKSPACE</strong> to close.</span>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
